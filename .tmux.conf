unbind C-b
set-option -g prefix C-j
bind C-j send-prefix
set -g history-limit 50000
set -g mode-keys vi

set -gq allow-passthrough on
set -g visual-activity off

# --- Claude Code / general TUI improvements ---
set -g default-terminal "tmux-256color"
set -ga terminal-features ",*:RGB"
# Tell tmux the outer terminal can accept clipboard (OSC 52) escapes.
# Harmless on GNOME Terminal (ignored); enables OSC 52 if you switch to
# kitty/wezterm/ghostty later — works through detach/reconnect, no X needed.
set -as terminal-features ",*:clipboard"
set -g focus-events on

set-option -s set-clipboard on
set-option -g mouse on

set -sg escape-time 0


# Clipboard over SSH: pipe to xclip on the *forwarded* X11 display so the copy
# lands on the laptop. $DISPLAY is read fresh from the tmux session env at copy
# time (show-environment) so it survives detach/reconnect when the persistent
# tmux server's own $DISPLAY goes stale. set-clipboard on (above) also emits
# OSC 52, so a future OSC-52-capable terminal works with no further change.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -i -display "$(tmux show-environment DISPLAY | cut -d= -f2-)"'
bind P run-shell 'xclip -selection clipboard -o -display "$(tmux show-environment DISPLAY | cut -d= -f2-)" | tmux load-buffer - && tmux paste-buffer'

bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard -i -display "$(tmux show-environment DISPLAY | cut -d= -f2-)"'


